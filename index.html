<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#651c27"><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="styles.css"><title>CervicePro</title></head>
<body><header><div class="brand">CERVANTEZ CONST, LLC.</div><h1>CERVICE<span>PRO</span></h1></header>
<main>
<section id="home" class="view active"><button class="big green" onclick="show('report')">⚠ REPORT FAULT</button><button class="big maroon" onclick="adminLogin()">🛡 ADMIN</button><button id="installBtn" class="small hidden">Install CervicePro</button></section>
<section id="report" class="view"><button class="back" onclick="show('home')">← Back</button><h2>Report Equipment Fault</h2>
<label>Scan or enter Equipment ID<input id="machineId" placeholder="EX03" autocomplete="off"></label><button class="small" onclick="lookup()">Load Machine</button>
<div id="machineCard" class="card muted">Machine information will appear here.</div>
<label>Current hours<input id="hours" type="number" inputmode="decimal"></label>
<p class="label">Machine condition</p><div class="seg"><button onclick="setCondition('Runnable',this)">Runnable</button><button onclick="setCondition('Unsure',this)">Unsure</button><button onclick="setCondition('Not Runnable',this)">Not Runnable</button></div>
<label id="reasonWrap" class="hidden">Reason machine may not be runnable<textarea id="conditionReason"></textarea></label>
<label>Describe the fault<textarea id="fault" required placeholder="What is the machine doing? Include warning lights, leaks, noises, or when the problem occurs."></textarea></label>
<label>Photos / videos<input id="media" type="file" accept="image/*,video/*" multiple capture="environment"></label>
<button class="big green" onclick="submitFault()">SUBMIT FAULT</button></section>
<section id="admin" class="view"><button class="back" onclick="show('home')">← Log out</button><h2>Administrator Dashboard</h2>
<div id="stats" class="stats"></div><div class="tabs"><button onclick="renderAdmin('open')">Open</button><button onclick="renderAdmin('completed')">Completed</button><button onclick="renderMachines()">Machines</button></div><div id="adminList"></div></section>
</main><dialog id="finishDialog"><form method="dialog"><h3>Finalize Work Order</h3><input type="hidden" id="finishId">
<label>Technician<input id="tech"></label><label>Repair performed<textarea id="repair"></textarea></label><label>Root cause<textarea id="rootCause"></textarea></label>
<label>What actually fixed the machine?<textarea id="actualFix"></textarea></label><label>Repair confidence<select id="confidence"><option>High</option><option>Medium</option><option>Low</option></select></label>
<label>Parts cost ($)<input id="partsCost" type="number" step=".01"></label><label>Labor cost ($)<input id="laborCost" type="number" step=".01"></label>
<menu><button value="cancel">Cancel</button><button value="default" onclick="completeWorkOrder()">Complete</button></menu></form></dialog>
<script src="config.js"></script><script src="app.js"></script></body></html>
